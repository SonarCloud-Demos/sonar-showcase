name: SonarQube
on:
  push:
    branches:
      - main
      - master
      - develop
      - release/**
      - hotfix/**
      - feature/**
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
        logLevel:
          description: 'Log level'
          required: true
          default: 'warning'
          type: choice
          options:
          - info
          - warning
          - debug
        tags:
          description: 'Test scenario tags'
          required: false
          type: boolean
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'zulu' # Alternative distribution options are available.
      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Configure npm to use public registry
        run: |
          # Remove any .npmrc files that might have been cached or exist
          rm -f ~/.npmrc
          rm -f .npmrc
          rm -f frontend/.npmrc
          rm -f malicious-attic/.npmrc

          # Rewrite package-lock.json to use public npm registry instead of Artifactory
          # This allows the same lockfile to work locally (with Artifactory) and in CI (with public registry)
          if [ -f frontend/package-lock.json ]; then
            echo "Rewriting package-lock.json URLs from Artifactory to public registry..."
            sed -i 's|https://repox.jfrog.io/artifactory/api/npm/npm/|https://registry.npmjs.org/|g' frontend/package-lock.json
            echo "✅ Rewritten $(grep -c 'registry.npmjs.org' frontend/package-lock.json) URLs"
          fi

          if [ -f malicious-attic/package-lock.json ]; then
            echo "Rewriting malicious-attic/package-lock.json URLs..."
            sed -i 's|https://repox.jfrog.io/artifactory/api/npm/npm/|https://registry.npmjs.org/|g' malicious-attic/package-lock.json
          fi

          echo "✅ npm configured to use public registry"
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
