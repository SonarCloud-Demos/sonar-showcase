name: SonarQube
on:
  push:
    branches:
      - main
      - master
      - develop
      - release/**
      - hotfix/**
      - feature/**
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'zulu' # Alternative distribution options are available.
      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Clear npm configuration to use public registry
        run: |
          # Remove any .npmrc files that might have been cached or exist
          rm -f ~/.npmrc
          rm -f .npmrc
          rm -f frontend/.npmrc
          rm -f malicious-attic/.npmrc
          # Verify npm will use default registry
          echo "Ensuring npm uses public registry (registry.npmjs.org)"
          echo "No .npmrc files present - npm will use defaults"
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar